<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPS Arena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas{display:block}
#blocker{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;cursor:pointer}
#blocker h1{color:#f44;font-size:48px;text-shadow:0 0 20px #f44}
#blocker p{color:#ccc;font-size:18px;margin-top:16px}
#hud{position:fixed;bottom:0;left:0;right:0;padding:16px 24px;display:flex;justify-content:space-between;align-items:flex-end;pointer-events:none;z-index:10}
.hud-section{display:flex;flex-direction:column;gap:4px}
.hud-label{color:#888;font-size:11px;text-transform:uppercase;letter-spacing:2px}
.hud-value{color:#0f0;font-size:28px;font-weight:bold;text-shadow:0 0 10px #0f0}
.hud-value.health{color:#f44;text-shadow:0 0 10px #f44}
.hud-value.ammo{color:#ff0;text-shadow:0 0 10px #ff0}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;pointer-events:none}
#crosshair div{position:absolute;background:#fff}
#crosshair .h{width:20px;height:2px;top:-1px;left:4px}
#crosshair .v{width:2px;height:20px;top:4px;left:-1px}
#damage{position:fixed;inset:0;pointer-events:none;z-index:9;opacity:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,0,0,.6));transition:opacity .1s}
#muzzle{position:fixed;bottom:60px;right:80px;width:40px;height:40px;border-radius:50%;background:radial-gradient(#ff0,#f80,transparent);opacity:0;pointer-events:none;z-index:10}
#killfeed{position:fixed;top:16px;right:16px;z-index:10;pointer-events:none}
.kill{color:#f44;font-size:14px;margin-bottom:4px;opacity:1;transition:opacity .5s}
#gameover{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:200;cursor:pointer}
#gameover h1{color:#f44;font-size:64px}
#gameover p{color:#ccc;font-size:24px;margin-top:12px}
#restartBtn{margin-top:24px;padding:14px 40px;font-size:22px;font-family:'Courier New',monospace;background:#f44;color:#fff;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:3px;transition:background .2s}
#restartBtn:hover{background:#f77}
#wave-info{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff0;font-size:36px;z-index:10;pointer-events:none;opacity:0;transition:opacity .5s;text-shadow:0 0 20px #ff0}
#enemy-counter{position:fixed;top:16px;left:16px;z-index:10;pointer-events:none;color:#f88;font-size:14px}
#settings-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.92);border:1px solid #555;padding:30px 40px;z-index:300;display:none;color:#ccc;font-family:'Courier New',monospace;min-width:320px}
#settings-panel h2{color:#0ff;font-size:22px;margin-bottom:20px;text-align:center}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.setting-row label{font-size:14px}
.setting-row input[type=range]{width:160px;accent-color:#0ff}
.setting-row .val{min-width:36px;text-align:right;color:#0ff;font-weight:bold}
#settings-close{display:block;margin:16px auto 0;padding:8px 24px;background:#0ff;color:#000;border:none;font-family:'Courier New',monospace;font-size:14px;cursor:pointer;text-transform:uppercase}
#settings-close:hover{background:#0cc}
#settings-gear{position:fixed;top:16px;right:60px;z-index:15;background:none;border:1px solid #555;color:#888;font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;display:none;pointer-events:auto}
#settings-gear:hover{color:#0ff;border-color:#0ff}
#blocker-settings{margin-top:20px;padding:10px 30px;font-size:16px;font-family:'Courier New',monospace;background:transparent;border:1px solid #888;color:#ccc;cursor:pointer;text-transform:uppercase;letter-spacing:2px}
#blocker-settings:hover{border-color:#0ff;color:#0ff}
#reload-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:120px;height:8px;background:rgba(0,0,0,.6);border:1px solid #888;display:none;z-index:10;pointer-events:none}
#reload-bar-fill{height:100%;background:#0ff;width:0%;transition:none}
#reload-bar-text{position:absolute;width:100%;text-align:center;top:-16px;color:#0ff;font-size:11px;font-family:'Courier New',monospace;text-transform:uppercase;letter-spacing:1px}
#knife-slash{position:fixed;inset:0;pointer-events:none;z-index:11;opacity:0;transition:opacity .08s}
#name-entry{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:250}
#name-entry h2{color:#f44;font-size:42px;text-shadow:0 0 20px #f44;margin-bottom:8px}
#name-entry .final-stats{color:#ccc;font-size:18px;margin-bottom:24px}
#name-entry label{color:#0ff;font-size:16px;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
#name-entry input{background:#111;border:1px solid #0ff;color:#0ff;font-family:'Courier New',monospace;font-size:22px;padding:10px 16px;text-align:center;width:280px;outline:none;margin-bottom:16px}
#name-entry input:focus{border-color:#0ff;box-shadow:0 0 12px #0ff}
#name-submit{padding:12px 36px;font-size:18px;font-family:'Courier New',monospace;background:#0ff;color:#000;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:3px}
#name-submit:hover{background:#0cc}
#leaderboard{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:260}
#leaderboard h2{color:#0ff;font-size:36px;text-shadow:0 0 20px #0ff;margin-bottom:20px}
#leaderboard table{border-collapse:collapse;width:90%;max-width:500px}
#leaderboard th{color:#888;font-size:13px;text-transform:uppercase;letter-spacing:2px;padding:6px 12px;border-bottom:1px solid #333}
#leaderboard td{color:#ccc;font-size:16px;padding:8px 12px;text-align:center}
#leaderboard tr:nth-child(even) td{background:rgba(255,255,255,.03)}
#leaderboard .rank-col{color:#0ff;font-weight:bold}
#leaderboard .name-col{text-align:left;color:#fff}
#leaderboard .score-col{color:#0f0;text-shadow:0 0 6px #0f0;font-weight:bold}
#leaderboard .wave-col{color:#ff0}
#leaderboard .new-score td{color:#f44;text-shadow:0 0 8px #f44}
#leaderboard .new-score .name-col{color:#f44}
#leaderboard .new-score .score-col{color:#f44;text-shadow:0 0 8px #f44}
#lb-buttons{margin-top:24px;display:flex;gap:16px}
#lb-buttons button{padding:12px 30px;font-size:16px;font-family:'Courier New',monospace;background:transparent;border:1px solid #888;color:#ccc;cursor:pointer;text-transform:uppercase;letter-spacing:2px}
#lb-buttons button:hover{border-color:#0ff;color:#0ff}
#blocker-hiscores{margin-top:12px;padding:10px 30px;font-size:16px;font-family:'Courier New',monospace;background:transparent;border:1px solid #888;color:#ccc;cursor:pointer;text-transform:uppercase;letter-spacing:2px}
#blocker-hiscores:hover{border-color:#0ff;color:#0ff}
</style>
</head>
<body>
<div id="blocker"><div style="text-align:center"><h1>FPS ARENA</h1><p>Click to play — WASD to move, Mouse to aim, Click to shoot, R to reload</p><button id="blocker-settings">Settings</button><button id="blocker-hiscores">High Scores</button></div></div>
<div id="settings-panel"><h2>Settings</h2><div class="setting-row"><label>Mouse Sensitivity</label><input type="range" id="sens-slider" min="0.5" max="5.0" step="0.1" value="2.0"><span class="val" id="sens-val">2.0</span></div><div class="setting-row"><label>Sound Volume</label><input type="range" id="vol-slider" min="0" max="100" step="5" value="80"><span class="val" id="vol-val">80%</span></div><button id="settings-close">Close</button></div>
<button id="settings-gear">⚙</button>
<div id="hud">
  <div class="hud-section"><span class="hud-label">Health</span><span class="hud-value health" id="hpVal">100</span></div>
  <div class="hud-section" style="align-items:center"><span class="hud-label">Score</span><span class="hud-value" id="scoreVal">0</span></div>
  <div class="hud-section" style="align-items:flex-end"><span class="hud-label">Wave</span><span class="hud-value" id="waveVal" style="color:#0ff;text-shadow:0 0 10px #0ff">1</span></div>
  <div class="hud-section" style="align-items:flex-end"><span class="hud-label">Ammo</span><span class="hud-value ammo" id="ammoVal">30 / 90</span></div>
</div>
<div id="crosshair"><div class="h"></div><div class="v"></div></div>
<div id="damage"></div>
<div id="muzzle"></div>
<div id="killfeed"></div>
<div id="wave-info"></div>
<div id="enemy-counter"></div>
<div id="reload-bar"><div id="reload-bar-text">Reloading</div><div id="reload-bar-fill"></div></div>
<canvas id="knife-slash" width="" height=""></canvas>
<div id="name-entry"><h2>GAME OVER</h2><div class="final-stats" id="name-final-stats"></div><label for="player-name">Enter Your Name</label><input type="text" id="player-name" maxlength="16" placeholder="Anonymous"><button id="name-submit">Submit</button></div>
<div id="leaderboard"><h2>HIGH SCORES</h2><table><thead><tr><th>Rank</th><th>Name</th><th>Score</th><th>Wave</th></tr></thead><tbody id="lb-body"></tbody></table><div id="lb-buttons"><button id="lb-restart">Play Again</button><button id="lb-menu">Menu</button></div></div>
<div id="gameover" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
// --- CONFIG ---
const ARENA=60, WALLH=5, PLAYERH=1.7, PLAYERR=0.4, SPEED=8, SPRINT=1.5;
const GRAVITY=20, JUMP=8, FIRE_RATE=0.12, BULLET_DMG=25, MAXHP=100;
const ENEMY_SPEED=3.5, ENEMY_HP=60, ENEMY_DMG=8, ENEMY_FIRE=1.5, ENEMY_RANGE=25;

// --- ENEMY TYPES ---
const ENEMY_TYPES=[
  {name:'Steven', color:0x2266cc, headColor:0x4488ee, bodyW:.55, bodyH:1.3, bodyD:.4, headR:.27, scale:1.1, hat:'cone', hatColor:0x1133aa},
  {name:'Matt',   color:0x22aa44, headColor:0x44cc66, bodyW:.8,  bodyH:1.0, bodyD:.5, headR:.28, scale:1.0, hat:'flatcap', hatColor:0x116622},
  {name:'Brighton',color:0x9922cc,headColor:0xcc44ee, bodyW:.45, bodyH:1.1, bodyD:.35,headR:.24, scale:.95,hat:'spiky', hatColor:0xbb33ee},
  {name:'Jeff',   color:0xdd7711, headColor:0xee9933, bodyW:.6,  bodyH:1.2, bodyD:.4, headR:.26, scale:1.0, hat:'sunglasses', hatColor:0x111111},
  {name:'Bill',   color:0xddcc22, headColor:0xeebb33, bodyW:.7,  bodyH:1.4, bodyD:.5, headR:.3,  scale:1.2, hat:'crown', hatColor:0xffcc00, melee:true, speed:5.5}
];
let enemyTypeIndex=0;

// --- SOUND SYSTEM (Web Audio API) ---
let audioCtx=null;
let soundVolume=parseFloat(localStorage.getItem('fps-vol')||'80')/100;
const volSlider=document.getElementById('vol-slider');
const volVal=document.getElementById('vol-val');
function updateVolDisplay(){volVal.textContent=volSlider.value+'%'}
volSlider.value=Math.round(soundVolume*100);updateVolDisplay();
volSlider.addEventListener('input',()=>{soundVolume=volSlider.value/100;localStorage.setItem('fps-vol',volSlider.value);updateVolDisplay()});

function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}

function playSound(type){
  ensureAudio();
  const ctx=audioCtx;const g=ctx.createGain();g.connect(ctx.destination);const now=ctx.currentTime;
  const vol=soundVolume;
  if(type==='gunshot'){
    // Short noise burst
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.08,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const src=ctx.createBufferSource();src.buffer=buf;g.gain.setValueAtTime(vol*0.5,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.08);src.connect(g);src.start(now);
  } else if(type==='reload'){
    const osc=ctx.createOscillator();osc.type='square';osc.frequency.setValueAtTime(800,now);osc.frequency.setValueAtTime(600,now+0.05);g.gain.setValueAtTime(vol*0.3,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.1);osc.connect(g);osc.start(now);osc.stop(now+0.1);
  } else if(type==='knife'){
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.2,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){const t=i/ctx.sampleRate;d[i]=(Math.random()*2-1)*Math.sin(t*200)*Math.pow(1-t/0.2,1.5)}
    const src=ctx.createBufferSource();src.buffer=buf;g.gain.setValueAtTime(vol*0.4,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.2);src.connect(g);src.start(now);
  } else if(type==='enemyDeath'){
    const osc=ctx.createOscillator();osc.type='sawtooth';osc.frequency.setValueAtTime(200,now);osc.frequency.exponentialRampToValueAtTime(50,now+0.3);g.gain.setValueAtTime(vol*0.35,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.3);osc.connect(g);osc.start(now);osc.stop(now+0.3);
  } else if(type==='hurt'){
    const osc=ctx.createOscillator();osc.type='sawtooth';osc.frequency.setValueAtTime(150,now);osc.frequency.setValueAtTime(100,now+0.1);g.gain.setValueAtTime(vol*0.4,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.2);osc.connect(g);osc.start(now);osc.stop(now+0.2);
  } else if(type==='pickup'){
    const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(880,now);osc.frequency.setValueAtTime(1320,now+0.06);osc.frequency.setValueAtTime(1760,now+0.12);g.gain.setValueAtTime(vol*0.3,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.25);osc.connect(g);osc.start(now);osc.stop(now+0.25);
  }
}

// --- STATE ---
let hp=MAXHP, ammo=30, reserve=90, score=0, wave=1, alive=true, playing=false;
let enemies=[], pickups=[], projectiles=[], fireCooldown=0, reloading=false, reloadTimer=0, reloadDuration=1.5;
let yaw=0, pitch=0, velocity=new THREE.Vector3();
let knifeCooldown=0;const KNIFE_CD=0.5,KNIFE_RANGE=2.5,KNIFE_DMG_MIN=75,KNIFE_DMG_MAX=100;

// --- THREE SETUP ---
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1a2e);
scene.fog=new THREE.Fog(0x1a1a2e,20,60);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,100);
camera.position.set(0,PLAYERH,0);
scene.add(camera);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambient=new THREE.AmbientLight(0x404060,0.6);
scene.add(ambient);
const dirLight=new THREE.DirectionalLight(0xffeedd,0.8);
dirLight.position.set(10,20,10);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(1024,1024);
dirLight.shadow.camera.near=0.5;dirLight.shadow.camera.far=80;
dirLight.shadow.camera.left=-40;dirLight.shadow.camera.right=40;
dirLight.shadow.camera.top=40;dirLight.shadow.camera.bottom=-40;
scene.add(dirLight);

const colors=[0xff4444,0x44ff44,0x4444ff,0xff8800];
for(let i=0;i<4;i++){
  const pl=new THREE.PointLight(colors[i],1,20);
  pl.position.set((i%2?1:-1)*20,3,((i>>1)?1:-1)*20);
  scene.add(pl);
}

// --- MAP ---
const floorGeo=new THREE.PlaneGeometry(ARENA,ARENA);
const floorMat=new THREE.MeshStandardMaterial({color:0x333344,roughness:0.8});
const floor=new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;
scene.add(floor);

const ceil=new THREE.Mesh(new THREE.PlaneGeometry(ARENA,ARENA),new THREE.MeshStandardMaterial({color:0x222233}));
ceil.rotation.x=Math.PI/2;ceil.position.y=WALLH;scene.add(ceil);

const walls=[];
function addWall(x,z,w,d,h,color){
  const geo=new THREE.BoxGeometry(w,h||WALLH,d);
  const mat=new THREE.MeshStandardMaterial({color:color||0x555577,roughness:0.6});
  const m=new THREE.Mesh(geo,mat);
  m.position.set(x,(h||WALLH)/2,z);m.castShadow=true;m.receiveShadow=true;
  scene.add(m);walls.push(m);
  return m;
}

const H=ARENA/2;
addWall(0,-H,ARENA,1);addWall(0,H,ARENA,1);
addWall(-H,0,1,ARENA);addWall(H,0,1,ARENA);

addWall(-10,-10,6,1,3,0x665555);addWall(-10,-7,1,6,3,0x665555);
addWall(10,10,6,1,3,0x556655);addWall(10,7,1,6,3,0x556655);
addWall(0,0,3,3,2.5,0x884422);
addWall(-20,0,1,10,3,0x555566);addWall(20,0,1,10,3,0x555566);
addWall(0,-20,10,1,3,0x665555);addWall(0,20,10,1,3,0x556655);
addWall(-15,15,4,1,2,0x668844);addWall(15,-15,4,1,2,0x668844);
addWall(-5,-18,1,4,2.5,0x886644);addWall(5,18,1,4,2.5,0x886644);
for(let i=0;i<12;i++){
  const s=1+Math.random()*1.5;
  const x=(Math.random()-.5)*(ARENA-8),z=(Math.random()-.5)*(ARENA-8);
  if(Math.abs(x)<3&&Math.abs(z)<3)continue;
  addWall(x,z,s,s,s,0x997744);
}

const collidables=[...walls];

// --- GUN MODEL ---
const gunGroup=new THREE.Group();
const gunBody=new THREE.Mesh(new THREE.BoxGeometry(.08,.08,.5),new THREE.MeshStandardMaterial({color:0x222222}));
gunBody.position.set(.25,-.2,-.4);gunGroup.add(gunBody);
const gunBarrel=new THREE.Mesh(new THREE.BoxGeometry(.05,.05,.3),new THREE.MeshStandardMaterial({color:0x333333}));
gunBarrel.position.set(.25,-.2,-.7);gunGroup.add(gunBarrel);
camera.add(gunGroup);

// --- NAME LABEL SPRITE ---
function makeLabel(name,color){
  const canvas=document.createElement('canvas');
  canvas.width=256;canvas.height=64;
  const ctx=canvas.getContext('2d');
  ctx.font='bold 32px Courier New';
  ctx.textAlign='center';
  ctx.fillStyle='#000';
  ctx.fillText(name,129,37);
  const c='#'+color.toString(16).padStart(6,'0');
  ctx.fillStyle=c;
  ctx.fillText(name,128,36);
  const tex=new THREE.CanvasTexture(canvas);
  const mat=new THREE.SpriteMaterial({map:tex,depthTest:false});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(2,.5,1);
  return sprite;
}

// --- ENEMY SPAWNING ---
function addHat(group, type, headY, headR){
  const hc=type.hatColor;
  const mat=new THREE.MeshStandardMaterial({color:hc});
  if(type.hat==='cone'){
    const cone=new THREE.Mesh(new THREE.ConeGeometry(headR*.7,.5,8),mat);
    cone.position.y=headY+headR+.25;
    group.add(cone);
    return headY+headR+.5;
  } else if(type.hat==='flatcap'){
    const brim=new THREE.Mesh(new THREE.CylinderGeometry(headR*1.1,headR*1.1,.06,12),mat);
    brim.position.y=headY+headR+.03;
    group.add(brim);
    const cap=new THREE.Mesh(new THREE.SphereGeometry(headR*.85,8,4,0,Math.PI*2,0,Math.PI/2),mat);
    cap.position.y=headY+headR*.1;
    group.add(cap);
    return headY+headR+.1;
  } else if(type.hat==='spiky'){
    for(let i=0;i<7;i++){
      const angle=(i/7)*Math.PI*2;
      const spike=new THREE.Mesh(new THREE.ConeGeometry(.06,.35,4),
        new THREE.MeshStandardMaterial({color:type.hatColor}));
      spike.position.set(Math.cos(angle)*headR*.6, headY+headR+.15, Math.sin(angle)*headR*.6);
      spike.rotation.x=Math.cos(angle)*.3;
      spike.rotation.z=Math.sin(angle)*.3;
      group.add(spike);
    }
    return headY+headR+.35;
  } else if(type.hat==='sunglasses'){
    const glassMat=new THREE.MeshStandardMaterial({color:0x111111});
    const lGeo=new THREE.BoxGeometry(.18,.08,.05);
    const lg=new THREE.Mesh(lGeo,glassMat);lg.position.set(-.12,headY+.02,headR-.02);group.add(lg);
    const rg=new THREE.Mesh(lGeo,glassMat);rg.position.set(.12,headY+.02,headR-.02);group.add(rg);
    const bridge=new THREE.Mesh(new THREE.BoxGeometry(.08,.03,.03),glassMat);
    bridge.position.set(0,headY+.02,headR-.01);group.add(bridge);
    return headY+headR+.1;
  } else if(type.hat==='crown'){
    const crownMat=new THREE.MeshStandardMaterial({color:0xffcc00,emissive:0x443300,emissiveIntensity:.3});
    const base=new THREE.Mesh(new THREE.CylinderGeometry(headR*.75,headR*.8,.25,6),crownMat);
    base.position.y=headY+headR+.12;group.add(base);
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2;
      const pt=new THREE.Mesh(new THREE.ConeGeometry(.06,.2,4),crownMat);
      pt.position.set(Math.cos(a)*headR*.6,headY+headR+.35,Math.sin(a)*headR*.6);
      group.add(pt);
    }
    return headY+headR+.55;
  }
  return headY+headR+.1;
}

function spawnEnemy(){
  const type=ENEMY_TYPES[enemyTypeIndex % ENEMY_TYPES.length];
  enemyTypeIndex++;

  const group=new THREE.Group();
  const sc=type.scale;
  const bw=type.bodyW*sc, bh=type.bodyH*sc, bd=type.bodyD*sc;
  const hr=type.headR*sc;

  const bodyMat=new THREE.MeshStandardMaterial({color:type.color});
  const headMat=new THREE.MeshStandardMaterial({color:type.headColor});

  // Body (torso)
  const body=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),bodyMat.clone());
  body.position.y=bh/2+.8*sc;body.castShadow=true;group.add(body);
  const bodyTop=body.position.y+bh/2;

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(hr,8,8),headMat.clone());
  const headY=bodyTop+hr;
  head.position.y=headY;head.castShadow=true;group.add(head);

  // Hat/accessory
  const labelY=addHat(group,type,headY,hr);

  // Arms (separate left/right for swing animation)
  const armGeo=new THREE.BoxGeometry(.12*sc,.7*sc,.12*sc);
  const la=new THREE.Mesh(armGeo,bodyMat.clone());
  la.position.set(-bw/2-.12*sc,body.position.y,0);la.castShadow=true;group.add(la);
  const ra=new THREE.Mesh(armGeo,bodyMat.clone());
  ra.position.set(bw/2+.12*sc,body.position.y,0);ra.castShadow=true;group.add(ra);

  // Gun or katana in right hand
  let katana=null;
  if(type.melee){
    // Katana handle
    const handle=new THREE.Mesh(new THREE.BoxGeometry(.06,.06,.25),new THREE.MeshStandardMaterial({color:0x553311}));
    handle.position.set(0,0,-.12);ra.add(handle);
    // Katana blade
    const blade=new THREE.Mesh(new THREE.BoxGeometry(.04,.04,1.0),new THREE.MeshStandardMaterial({color:0xcccccc,metalness:.8,roughness:.2}));
    blade.position.set(0,0,-.75);ra.add(blade);
    katana=ra;
  } else {
    const gun=new THREE.Mesh(new THREE.BoxGeometry(.08,.08,.4),new THREE.MeshStandardMaterial({color:0x444444}));
    gun.position.set(0,0,-.25);ra.add(gun);
  }

  // Legs (separate left/right for walk animation)
  const legGeo=new THREE.BoxGeometry(.2*sc,.8*sc,.2*sc);
  const ll=new THREE.Mesh(legGeo,bodyMat.clone());ll.position.set(-.15*sc,.4*sc,0);ll.castShadow=true;group.add(ll);
  const rl=new THREE.Mesh(legGeo,bodyMat.clone());rl.position.set(.15*sc,.4*sc,0);rl.castShadow=true;group.add(rl);

  // Name label
  const label=makeLabel(type.name,type.color);
  label.position.y=labelY+.3;
  group.add(label);

  // Bill kidney hitboxes (pulsing targets)
  let kidneys=null;
  if(type.name==='Bill'){
    const kidneyMat1=new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:1});
    const kidneyMat2=new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:1});
    const kidneyGeo=new THREE.SphereGeometry(.15,6,6);
    const k1=new THREE.Mesh(kidneyGeo,kidneyMat1);
    k1.position.set(-bw/2-.05, body.position.y-bh*0.25, -bd/2-.05);
    group.add(k1);
    const k2=new THREE.Mesh(kidneyGeo,kidneyMat2);
    k2.position.set(bw/2+.05, body.position.y-bh*0.25, -bd/2-.05);
    group.add(k2);
    kidneys=[k1,k2];
  }

  // Spawn at random position away from player
  let x,z;
  do{
    x=(Math.random()-.5)*(ARENA-6);z=(Math.random()-.5)*(ARENA-6);
  }while(Math.sqrt((x-camera.position.x)**2+(z-camera.position.z)**2)<12);

  group.position.set(x,0,z);
  scene.add(group);

  enemies.push({
    group,body,head,ll,rl,la,ra,label,type:type.name,typeColor:type.color,
    hp:ENEMY_HP+wave*10,
    maxHp:ENEMY_HP+wave*10,
    fireTimer:Math.random()*ENEMY_FIRE,
    dead:false,deathTimer:0,removed:false,
    walkPhase:Math.random()*Math.PI*2,
    kidneys, katana, meleeSwing:0, meleeCooldown:0
  });
}

// --- PLAYER BULLET TRACERS ---
const playerTracers=[];
function spawnPlayerTracer(origin,dir){
  const speed=120;

  ]);

// --- LINE OF SIGHT CHECK ---
const losRaycaster=new THREE.Raycaster();
function hasLineOfSight(from, to){
  const dir=new THREE.Vector3().subVectors(to,from);
  const dist=dir.length();
  dir.normalize();
  losRaycaster.set(from,dir);
  losRaycaster.far=dist;
  const hits=losRaycaster.intersectObjects(collidables);
  return hits.length===0;
}

// --- ENEMY WALL COLLISION ---
function enemyCollide(pos, r){
  for(const w of walls){
    const box=new THREE.Box3().setFromObject(w);
    box.min.x-=r;box.min.z-=r;box.max.x+=r;box.max.z+=r;
    if(pos.x>box.min.x&&pos.x<box.max.x&&pos.z>box.min.z&&pos.z<box.max.z){
      const cx=(box.min.x+box.max.x)/2,cz=(box.min.z+box.max.z)/2;
      const dx=pos.x-cx,dz=pos.z-cz;
      const hw=(box.max.x-box.min.x)/2,hd=(box.max.z-box.min.z)/2;
      const ox=hw-Math.abs(dx),oz=hd-Math.abs(dz);
      if(ox<oz)pos.x+=ox*Math.sign(dx);else pos.z+=oz*Math.sign(dz);
    }
  }
}

// --- SHOOTING ---
const raycaster=new THREE.Raycaster();
raycaster.far=100;

function shoot(){
  if(!alive||fireCooldown>0||reloading)return;
  if(ammo<=0){if(reserve>0)startReload();return}
  ammo--;fireCooldown=FIRE_RATE;
  playSound('gunshot');

  const mf=document.getElementById('muzzle');
  mf.style.opacity=1;setTimeout(()=>mf.style.opacity=0,50);

  gunGroup.rotation.x=-.3;
  setTimeout(()=>gunGroup.rotation.x=0,80);

  // Reset raycaster far to ensure full range
  raycaster.far=100;
  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);

  // Spawn visible bullet tracer
  const tracerDir=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  spawnPlayerTracer(camera.position.clone().add(tracerDir.clone().multiplyScalar(0.5)),tracerDir);

  // Check kidney hitboxes first (Bill only, 10x damage)
  let hitEnemy=null,hitDist=Infinity,hitKidney=false;
  for(const e of enemies){
    if(e.dead||!e.kidneys)continue;
    const hits=raycaster.intersectObjects(e.kidneys);
    if(hits.length>0&&hits[0].distance<hitDist){
      hitDist=hits[0].distance;hitEnemy=e;hitKidney=true;
    }
  }

  // Check body/head hitboxes
  for(const e of enemies){
    if(e.dead)continue;
    const meshes=[e.body,e.head];
    const hits=raycaster.intersectObjects(meshes);
    if(hits.length>0&&hits[0].distance<hitDist){
      hitDist=hits[0].distance;hitEnemy=e;hitKidney=false;
    }
  }

  if(hitEnemy){
    if(hitKidney){
      const dmg=BULLET_DMG*10;
      hitEnemy.hp-=dmg;
      hitEnemy.body.material.emissive.set(0xff0000);
      hitEnemy.head.material.emissive.set(0xff0000);
      addKillFeed('KIDNEY SHOT on '+hitEnemy.type+'! '+dmg+' dmg');
      setTimeout(()=>{hitEnemy.body.material.emissive.set(0);hitEnemy.head.material.emissive.set(0)},120);
    } else {
      const headshot=raycaster.intersectObjects([hitEnemy.head]).length>0;
      const dmg=headshot?BULLET_DMG*2:BULLET_DMG;
      hitEnemy.hp-=dmg;
      hitEnemy.body.material.emissive.set(0xffffff);
      hitEnemy.head.material.emissive.set(0xffffff);
      setTimeout(()=>{hitEnemy.body.material.emissive.set(0);hitEnemy.head.material.emissive.set(0)},80);
      if(hitEnemy.hp<=0)killEnemy(hitEnemy,headshot);
    }
    if(hitEnemy.hp<=0&&!hitEnemy.dead)killEnemy(hitEnemy,false);
  }

  const wallHits=raycaster.intersectObjects(collidables);
  if(wallHits.length>0&&wallHits[0].distance<hitDist){
    createSpark(wallHits[0].point);
  }

  if(ammo===0&&reserve>0)startReload();
  updateHUD();
}

function knifeAttack(){
  if(!alive||knifeCooldown>0)return;
  knifeCooldown=KNIFE_CD;
  playSound('knife');
  showKnifeSlash();

  // Use a separate knife raycaster so gun raycaster is never affected
  const knifeRay=new THREE.Raycaster();
  knifeRay.far=KNIFE_RANGE;
  knifeRay.setFromCamera(new THREE.Vector2(0,0),camera);

  let hitEnemy=null,hitDist=Infinity;
  for(const e of enemies){
    if(e.dead)continue;
    const meshes=[e.body,e.head];
    const hits=knifeRay.intersectObjects(meshes);
    if(hits.length>0&&hits[0].distance<hitDist){hitDist=hits[0].distance;hitEnemy=e}
  }
  if(hitEnemy){
    const dmg=KNIFE_DMG_MIN+Math.floor(Math.random()*(KNIFE_DMG_MAX-KNIFE_DMG_MIN+1));
    hitEnemy.hp-=dmg;
    hitEnemy.body.material.emissive.set(0xffffff);
    hitEnemy.head.material.emissive.set(0xffffff);
    setTimeout(()=>{hitEnemy.body.material.emissive.set(0);hitEnemy.head.material.emissive.set(0)},80);
    if(hitEnemy.hp<=0)killEnemy(hitEnemy,false,true);
  }
}


function showKnifeSlash(){
  const c=document.getElementById('knife-slash');
  c.width=innerWidth;c.height=innerHeight;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  const cx=c.width/2,cy=c.height/2,r=Math.min(c.width,c.height)*0.35;
  ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=4;ctx.shadowColor='#fff';ctx.shadowBlur=15;
  ctx.beginPath();
  ctx.arc(cx,cy,r,-Math.PI*0.6,-Math.PI*0.1);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx,cy,r*0.85,-Math.PI*0.55,-Math.PI*0.15);
  ctx.lineWidth=2;ctx.stroke();
  c.style.opacity=1;
  setTimeout(()=>{c.style.opacity=0;ctx.clearRect(0,0,c.width,c.height)},150);
}

function startReload(){reloading=true;reloadTimer=reloadDuration=1.5;playSound('reload');document.getElementById('reload-bar').style.display='block'}

function killEnemy(e,headshot,knife){
  e.dead=true;e.deathTimer=1.2;
  playSound('enemyDeath');
  const pts=knife?200:headshot?150:100;
  score+=pts;
  let txt;
  if(knife)txt='KNIFED '+e.type+'! +200';
  else if(headshot)txt='HEADSHOT on '+e.type+'! +150';
  else txt='Eliminated '+e.type+' +'+pts;
  addKillFeed(txt);
  updateHUD();

  // Ammo drop ~50% chance
  if(Math.random()<0.5){
    spawnPickup(e.group.position.x,e.group.position.z,'ammo');
  }

  if(enemies.every(en=>en.dead)){
    wave++;
    for(let i=0;i<3;i++){
      spawnPickup((Math.random()-.5)*(ARENA-6),(Math.random()-.5)*(ARENA-6),
        Math.random()<.5?'health':'ammo');
    }
    setTimeout(()=>spawnWave(),2000);
  }
}

function createSpark(pos){
  const geo=new THREE.BufferGeometry();
  const verts=[];
  for(let i=0;i<6;i++){
    verts.push(pos.x,pos.y,pos.z);
    verts.push(pos.x+(Math.random()-.5)*.5,pos.y+(Math.random()-.5)*.5,pos.z+(Math.random()-.5)*.5);
  }
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  const lines=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:0xffaa00}));
  scene.add(lines);
  setTimeout(()=>scene.remove(lines),100);
}

  const kf=document.getElementById('killfeed');kf.appendChild(d);

function saveHighScore(name,score,wave){
  let scores=getHighScores();
  scores.push({name,score,wave,date:Date.now()});
  scores.sort((a,b)=>b.score-a.score);
  scores=scores.slice(0,10);
  localStorage.setItem('fps-arena-highscores',JSON.stringify(scores));
  localStorage.setItem('fps-arena-lastname',name);
  return scores.findIndex(s=>s.score===score&&s.name===name&&s.date===scores[scores.indexOf(s)].date);

function renderLeaderboard(highlightScore){
  const scores=getHighScores();
  const tbody=document.getElementById('lb-body');
  tbody.innerHTML='';
  if(scores.length===0){tbody.innerHTML='<tr><td colspan="4" style="color:#555">No scores yet</td></tr>';return}
  scores.forEach((s,i)=>{
    const tr=document.createElement('tr');
    const isNew=highlightScore!=null&&s.score===highlightScore&&i===scores.findIndex(x=>x.score===highlightScore);
    if(isNew)tr.className='new-score';
    tr.innerHTML='<td class="rank-col">'+(i+1)+'</td><td class="name-col">'+escHtml(s.name)+'</td><td class="score-col">'+s.score+'</td><td class="wave-col">'+s.wave+'</td>';
    tbody.appendChild(tr);
  });
}

function restart(){
  // Full reset
  hp=MAXHP;ammo=30;reserve=90;score=0;wave=1;alive=true;playing=false;
  enemyTypeIndex=0;fireCooldown=0;reloading=false;reloadTimer=0;
  yaw=0;pitch=0;velocity.set(0,0,0);

  // Remove all enemies
  enemies.forEach(e=>scene.remove(e.group));enemies=[];
  // Remove all pickups
  pickups.forEach(p=>scene.remove(p.mesh));pickups=[];
  // Remove all projectiles
  projectiles.forEach(p=>scene.remove(p.mesh));projectiles=[];
  // Remove all player tracers
  playerTracers.forEach(t=>scene.remove(t.mesh));playerTracers=[];

  // Reset player position
  camera.position.set(0,PLAYERH,0);
  camera.rotation.set(0,0,0);

  // Hide game over, show blocker
  document.getElementById('gameover').style.display='none';
  blocker.style.display='flex';
  updateHUD();

  // Request pointer lock to start playing
  renderer.domElement.requestPointerLock();
  // Spawn wave after a brief moment
  setTimeout(()=>spawnWave(),500);
}

// --- PLAYER COLLISION ---
function collide(pos,r){
  for(const w of walls){
    const box=new THREE.Box3().setFromObject(w);
    box.min.x-=r;box.min.z-=r;box.max.x+=r;box.max.z+=r;
    if(pos.x>box.min.x&&pos.x<box.max.x&&pos.z>box.min.z&&pos.z<box.max.z){
      const cx=(box.min.x+box.max.x)/2,cz=(box.min.z+box.max.z)/2;
      const dx=pos.x-cx,dz=pos.z-cz;
      const hw=(box.max.x-box.min.x)/2,hd=(box.max.z-box.min.z)/2;
      const ox=hw-Math.abs(dx),oz=hd-Math.abs(dz);
      if(ox<oz)pos.x+=ox*Math.sign(dx);else pos.z+=oz*Math.sign(dz);

// --- MAIN LOOP ---
let prevTime=performance.now();

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(),dt=Math.min((now-prevTime)/1000,0.05);
  prevTime=now;

  if(playing&&alive){
    // Movement
    const sprint=keys['ShiftLeft']?SPRINT:1;
    const forward=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

    let mf=0,mr=0;
    if(keys['KeyW'])mf+=1;if(keys['KeyS'])mf-=1;
    if(keys['KeyD'])mr+=1;if(keys['KeyA'])mr-=1;

    const moveDir=new THREE.Vector3();
    moveDir.addScaledVector(forward,mf);moveDir.addScaledVector(right,mr);
    if(moveDir.length()>0)moveDir.normalize();

    velocity.x=moveDir.x*SPEED*sprint;
    velocity.z=moveDir.z*SPEED*sprint;

    velocity.y-=GRAVITY*dt;
    if(keys['Space']&&camera.position.y<=PLAYERH+.01)velocity.y=JUMP;

    camera.position.x+=velocity.x*dt;
    collide(camera.position,PLAYERR);
    camera.position.z+=velocity.z*dt;
    collide(camera.position,PLAYERR);
    camera.position.y+=velocity.y*dt;

    if(camera.position.y<PLAYERH){camera.position.y=PLAYERH;velocity.y=0}

    camera.rotation.order='YXZ';
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;

    if(fireCooldown>0)fireCooldown-=dt;

    // Reload
    if(reloading){
      reloadTimer-=dt;
      const prog=1-reloadTimer/reloadDuration;
      const barFill=document.getElementById('reload-bar-fill');
      barFill.style.width=(prog*100)+'%';
      if(reloadTimer<=0){
        reloading=false;
        const need=30-ammo,take=Math.min(need,reserve);
        ammo+=take;reserve-=take;
        document.getElementById('reload-bar').style.display='none';
        playSound('reload');
        updateHUD();
      }
    }
    if(knifeCooldown>0)knifeCooldown-=dt;

    // Enemy AI
    for(const e of enemies){
      if(e.dead){
        e.deathTimer-=dt;
        e.group.rotation.x=Math.min(Math.PI/2,e.group.rotation.x+dt*4);
        e.group.position.y-=dt*2;
        if(e.deathTimer<=0){scene.remove(e.group);e.removed=true}
        continue;
      }
      const ep=e.group.position;
      const dx=camera.position.x-ep.x,dz=camera.position.z-ep.z;
      const dist=Math.sqrt(dx*dx+dz*dz);

      // Face player
      e.group.rotation.y=Math.atan2(dx,dz);

      // Move toward player (with wall collision)
      const isMelee=e.type==='Bill';
      const stopDist=isMelee?1.5:3.5;
      if(dist>stopDist){
        const spd=isMelee?(e.katana?5.5:ENEMY_SPEED):(ENEMY_SPEED+wave*0.3);
        const moveX=dx/dist*spd*dt;
        const moveZ=dz/dist*spd*dt;

        // Try X movement
        ep.x+=moveX;
        enemyCollide(ep,.5);

        // Try Z movement
        ep.z+=moveZ;
        enemyCollide(ep,.5);

        // Walk animation
        e.walkPhase+=dt*8;
        e.ll.rotation.x=Math.sin(e.walkPhase)*.5;
        e.rl.rotation.x=-Math.sin(e.walkPhase)*.5;
        e.la.rotation.x=-Math.sin(e.walkPhase)*.4;
        e.ra.rotation.x=Math.sin(e.walkPhase)*.4;
      } else {
        e.ll.rotation.x*=.9;e.rl.rotation.x*=.9;
        e.la.rotation.x*=.9;e.ra.rotation.x*=.9;
      }

      // Melee attack (Bill katana)
      if(isMelee){
        e.meleeCooldown-=dt;
        if(dist<2.0 && e.meleeCooldown<=0){
          damagePlayer(15+wave*2);
          e.meleeCooldown=0.8;
          e.meleeSwing=1.0;
        }
        // Katana swing animation
        if(e.meleeSwing>0){
          e.meleeSwing-=dt*4;
          if(e.katana)e.katana.rotation.x=-Math.sin(e.meleeSwing*Math.PI)*1.2;
        } else if(e.katana){
          e.katana.rotation.x*=.9;
        }
      }

      // Kidney pulse animation (Bill)
      if(e.kidneys){
        const pulse=Math.sin(now*0.006)*0.5+0.5; // 0-1 alternating
        for(const k of e.kidneys){
          k.material.emissiveIntensity=0.5+pulse*1.5;
          if(pulse>0.5)k.material.emissive.set(0xffffff);
          else k.material.emissive.set(0xff0000);
        }
      }

      // Shoot — only if line of sight is clear (not melee enemies)
      if(!isMelee){
      e.fireTimer-=dt;
      if(e.fireTimer<=0&&dist<ENEMY_RANGE){
        e.fireTimer=Math.max(.5,ENEMY_FIRE-wave*0.05);

        // Line of sight check: enemy eye to player
        const eyePos=new THREE.Vector3(ep.x,ep.y+1.5,ep.z);
        const playerPos=camera.position.clone();
        if(hasLineOfSight(eyePos,playerPos)){
          // Spawn visible projectile
          const acc=Math.max(.25,1-dist/ENEMY_RANGE);
          const dmg=ENEMY_DMG+wave;
          // Add inaccuracy
          const target=camera.position.clone();
          target.x+=(Math.random()-.5)*2*(1-acc);
          target.y+=(Math.random()-.5)*2*(1-acc);
          target.z+=(Math.random()-.5)*2*(1-acc);
          spawnProjectile(eyePos,target,dmg,e.typeColor);
        }
      }
      } // end non-melee
    }
    enemies=enemies.filter(e=>!e.removed);

    // Update projectiles
    for(let i=projectiles.length-1;i>=0;i--){
      const p=projectiles[i];
      p.age+=dt;
      const move=p.dir.clone().multiplyScalar(p.speed*dt);
      p.mesh.position.add(move);

      // Check if hit player
      const distToPlayer=p.mesh.position.distanceTo(camera.position);
      if(distToPlayer<.8){
        damagePlayer(p.dmg);
        scene.remove(p.mesh);
        projectiles.splice(i,1);
        continue;
      }

      // Check if hit wall
      let hitWall=false;
      for(const w of walls){
        const box=new THREE.Box3().setFromObject(w);
        if(box.containsPoint(p.mesh.position)){hitWall=true;break}
      }
      if(hitWall||p.age>p.maxAge){
        createSpark(p.mesh.position.clone());
        scene.remove(p.mesh);
        projectiles.splice(i,1);
      }
    }

    // Update player tracers
    for(let i=playerTracers.length-1;i>=0;i--){
      const t=playerTracers[i];
      t.age+=dt;
      t.mesh.position.addScaledVector(t.dir,t.speed*dt);
      if(t.age>t.maxAge){scene.remove(t.mesh);playerTracers.splice(i,1)}
    }

    // Pickups
    for(let i=pickups.length-1;i>=0;i--){
      const p=pickups[i];
      p.time+=dt;
      p.mesh.rotation.y+=dt*2;
      p.mesh.position.y=.5+Math.sin(p.time*3)*.15;
      const dx=camera.position.x-p.mesh.position.x,dz=camera.position.z-p.mesh.position.z;
      if(dx*dx+dz*dz<4){
        if(p.type==='health'&&hp<MAXHP){hp=Math.min(MAXHP,hp+25)}
        else if(p.type==='ammo'){reserve+=30}
        else continue;
        playSound('pickup');
        scene.remove(p.mesh);pickups.splice(i,1);
        updateHUD();
      }
    }
  }

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

updateHUD();
spawnWave();
animate();
})();
</script>
</body>
</html>
